name: Build ecos Image

on:
  push:
    branches: [main]
    paths:
      - 'container/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ecos
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      # ====================================================
      # PHASE 1: Build & Push container image
      # ====================================================
      - name: Build container image
        run: |
          podman build -t ecos:latest -f container/Containerfile .

      - name: Login to GHCR with PAT
        run: |
          echo "${{ secrets.GHCR_PAT }}" | podman login ghcr.io \
            -u overyanosh --password-stdin

      - name: Tag and Push image
        run: |
          IMAGE_URL="ghcr.io/overyanosh/ecos:latest"
          podman tag ecos:latest "$IMAGE_URL"
          podman push "$IMAGE_URL"

      # ====================================================
      # PHASE 2: Build bootable disk image with bootc-image-builder
      # ====================================================
      - name: Pull bootc-image-builder
        run: |
          sudo podman pull quay.io/centos-bootc/bootc-image-builder:latest

      - name: Pull ecos image from GHCR (as root)
        run: |
          echo "${{ secrets.GHCR_PAT }}" | sudo podman login ghcr.io \
            -u overyanosh --password-stdin
          sudo podman pull ghcr.io/overyanosh/ecos:latest

      - name: Inspect ecos image (debug)
        run: |
          echo "=== Image info ==="
          sudo podman images
          echo ""
          echo "=== Image inspect ==="
          sudo podman inspect ghcr.io/overyanosh/ecos:latest | head -50

      - name: Build bootable disk image (RAW)
        run: |
          mkdir -p ./output
          echo "=== Starting bootc-image-builder ==="
          sudo podman run --rm --privileged \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v $(pwd)/output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            ghcr.io/overyanosh/ecos:latest \
            --type raw \
            --rootfs xfs \
            --verbose 2>&1 | tee ./output/build.log

      - name: Show full build log on failure
        if: failure()
        run: |
          echo "=== Full build log ==="
          cat ./output/build.log || echo "No log file found"
          echo ""
          echo "=== Output directory ==="
          ls -la ./output/ || true

      - name: Compress disk image
        if: success()
        run: |
          if [[ -f ./output/disk.raw ]]; then
            mv ./output/disk.raw ./output/ecos-x86_64.raw
            xz -v -T0 ./output/ecos-x86_64.raw
          else
            echo "[WARN] No disk image found in ./output/"
            ls -la ./output/ || true
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecos-usb-image
          path: ./output/*
          retention-days: 30
          if-no-files-found: warn